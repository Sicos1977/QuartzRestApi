  langs:
  - csharp
  - vb
  name: ApiKeyProfile
  nameWithType: ApiKeyProfile
  fullName: QuartzRestApi.Security.ApiKeyProfile
  type: Class
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Security
  summary: >-
    Represents a named API key profile that controls which Scheduler endpoints

    the bearer of <xref href="QuartzRestApi.Security.ApiKeyProfile.ApiKey" data-throw-if-not-resolved="false"></xref> is allowed to call.
  remarks: >-
    <p>
        Every endpoint has a corresponding <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">bool</a> property on this
        class. All properties default to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> (full access).
        Set a property to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to block that endpoint for this profile.
    </p>

    <p>
        The profile can be persisted to JSON with <xref href="QuartzRestApi.Security.ApiKeyProfile.ToJson" data-throw-if-not-resolved="false"></xref> and restored
        with <xref href="QuartzRestApi.Security.ApiKeyProfile.FromJson(System.String)" data-throw-if-not-resolved="false"></xref>, making it easy to store profiles in a configuration
        file or database.
    </p>
  example:
  - >-
    <pre><code class="lang-csharp">// Admin profile — full access to all endpoints.

    var admin = ApiKeyProfile.AllowAll("Admin", "key-admin-xyz789");


    // Read-only profile — start with no access, then selectively enable query endpoints.

    var readOnly = ApiKeyProfile.DenyAll("ReadOnly", "key-readonly-abc123");

    readOnly.SchedulerName          = true;

    readOnly.SchedulerInstanceId    = true;

    readOnly.GetMetaData            = true;

    readOnly.GetJobGroupNames       = true;

    readOnly.GetTriggerGroupNames   = true;

    readOnly.GetJobKeys             = true;

    readOnly.GetJobDetail           = true;

    readOnly.GetTrigger             = true;

    readOnly.GetTriggerState        = true;

    readOnly.GetCurrentlyExecutingJobs = true;


    var host = new SchedulerHost("http://localhost:45000", scheduler, logger,
        profiles: [admin, readOnly]);

    // Persist a profile to disk and reload it:

    File.WriteAllText("readOnly.json", readOnly.ToJson());

    var loaded = ApiKeyProfile.FromJson(File.ReadAllText("readOnly.json"));</code></pre>
  syntax:
    content: public sealed class ApiKeyProfile
    content.vb: Public NotInheritable Class ApiKeyProfile
