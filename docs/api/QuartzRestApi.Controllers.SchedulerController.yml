- uid: QuartzRestApi.Controllers.SchedulerController.Standby
  commentId: M:QuartzRestApi.Controllers.SchedulerController.Standby
  id: Standby
  parent: QuartzRestApi.Controllers.SchedulerController
  langs:
  - csharp
  - vb
  name: Standby()
  nameWithType: SchedulerController.Standby()
  fullName: QuartzRestApi.Controllers.SchedulerController.Standby()
  type: Method
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Controllers
  summary: Temporarily halts the <xref href="Quartz.IScheduler" data-throw-if-not-resolved="false"></xref>'s firing of <xref href="Quartz.ITrigger" data-throw-if-not-resolved="false"></xref>s.
  remarks: >-
    <p>
        When <xref href="QuartzRestApi.Controllers.SchedulerController.Start" data-throw-if-not-resolved="false"></xref> is called (to bring the scheduler out of
        stand-by mode), trigger misfire instructions will NOT be applied
        during the execution of the <xref href="QuartzRestApi.Controllers.SchedulerController.Start" data-throw-if-not-resolved="false"></xref> method - any misfires
        will be detected immediately afterward (by the <xref href="Quartz.Spi.IJobStore" data-throw-if-not-resolved="false"></xref>'s
        normal process).
    </p>

    <p>
        The scheduler is not destroyed, and can be re-started at any time.
    </p>
  example: []
  syntax:
    content: >-
      [HttpPost]

      [Route("Scheduler/Standby")]

      public Task Standby()
    return:
      type: System.Threading.Tasks.Task
    content.vb: >-
      <HttpPost>

      <Route("Scheduler/Standby")>

      Public Function Standby() As Task
