- uid: QuartzRestApi.Controllers.SchedulerController.InterruptJobKey(System.String)
  commentId: M:QuartzRestApi.Controllers.SchedulerController.InterruptJobKey(System.String)
  id: InterruptJobKey(System.String)
  parent: QuartzRestApi.Controllers.SchedulerController
  langs:
  - csharp
  - vb
  name: InterruptJobKey(string)
  nameWithType: SchedulerController.InterruptJobKey(string)
  fullName: QuartzRestApi.Controllers.SchedulerController.InterruptJobKey(string)
  type: Method
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Controllers
  summary: >-
    Request the cancellation, within this Scheduler instance, of all

    currently executing instances of the identified <xref href="Quartz.IJob" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>
        If more than one instance of the identified job is currently executing,
        the cancellation token will be set on each instance.  However, there is a limitation that in the case that
        <xref href="QuartzRestApi.Controllers.SchedulerController.InterruptJobKey(System.String)" data-throw-if-not-resolved="false"></xref> on one instances throws an exception, all
        remaining  instances (that have not yet been interrupted) will not have
        their <xref href="QuartzRestApi.Controllers.SchedulerController.InterruptJobKey(System.String)" data-throw-if-not-resolved="false"></xref> method called.
    </p>

    <p>
        If you wish to interrupt a specific instance of a job (when more than
        one is executing) you can do so by calling
        <xref href="QuartzRestApi.Controllers.SchedulerController.GetCurrentlyExecutingJobs" data-throw-if-not-resolved="false"></xref> to obtain a handle
        to the job instance, and then invoke <xref href="QuartzRestApi.Controllers.SchedulerController.InterruptJobKey(System.String)" data-throw-if-not-resolved="false"></xref> on it
        yourself.
    </p>

    <p>
        This method is not cluster aware.  That is, it will only interrupt
        instances of the identified InterruptableJob currently executing in this
        Scheduler instance, not across the entire cluster.
    </p>
  example: []
  syntax:
    content: >-
      [HttpGet]

      [Route("Scheduler/InterruptJobKey")]

      public bool InterruptJobKey(string json)
    parameters:
    - id: json
      type: System.String
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    return:
      type: System.Boolean
      description: true is at least one instance of the identified job was found and interrupted.
    content.vb: >-
      <HttpGet>

      <Route("Scheduler/InterruptJobKey")>

      Public Function InterruptJobKey(json As String) As Boolean
  overload: QuartzRestApi.Controllers.SchedulerController.InterruptJobKey*
  seealso:
