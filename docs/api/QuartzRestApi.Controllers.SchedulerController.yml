  namespace: QuartzRestApi.Controllers
  summary: >-
    Starts the <xref href="Quartz.IScheduler" data-throw-if-not-resolved="false"></xref>'s threads that fire <xref href="Quartz.ITrigger" data-throw-if-not-resolved="false"></xref>s.

    When a scheduler is first created it is in "stand-by" mode, and will not

    fire triggers.  The scheduler can also be put into stand-by mode by

    calling the <xref href="QuartzRestApi.Controllers.SchedulerController.Standby" data-throw-if-not-resolved="false"></xref> method.
  remarks: >-
    The misfire/recovery process will be started, if it is the initial call

    to this method on this scheduler instance.
