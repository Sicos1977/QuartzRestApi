- uid: QuartzRestApi.Wrappers.RunningJobs.RecoveringTriggerKey
  commentId: P:QuartzRestApi.Wrappers.RunningJobs.RecoveringTriggerKey
  id: RecoveringTriggerKey
  parent: QuartzRestApi.Wrappers.RunningJobs
  langs:
  - csharp
  - vb
  name: RecoveringTriggerKey
  nameWithType: RunningJobs.RecoveringTriggerKey
  fullName: QuartzRestApi.Wrappers.RunningJobs.RecoveringTriggerKey
  type: Property
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Wrappers
  summary: Returns the <xref href="Quartz.TriggerKey" data-throw-if-not-resolved="false"></xref> of the originally scheduled and now recovering job.
  remarks: >-
    When recovering a previously failed job execution this property returns the identity

    of the originally firing trigger. This recovering job will have been scheduled for

    the same firing time as the original job, and so is available via the

    <xref href="Quartz.IJobExecutionContext.ScheduledFireTimeUtc" data-throw-if-not-resolved="false"></xref> property. The original firing time of the job can be

    accessed via the <xref href="Quartz.SchedulerConstants.FailedJobOriginalTriggerFiretime" data-throw-if-not-resolved="false"></xref>

    element of this job's <xref href="Quartz.JobDataMap" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public TriggerKey RecoveringTriggerKey { get; }
    parameters: []
    return:
      type: Quartz.TriggerKey
    content.vb: Public ReadOnly Property RecoveringTriggerKey As TriggerKey
  overload: QuartzRestApi.Wrappers.RunningJobs.RecoveringTriggerKey*
  implements:
  - Quartz.IJobExecutionContext.RecoveringTriggerKey
