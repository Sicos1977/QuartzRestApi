- uid: QuartzRestApi.Wrappers.RunningJobs.Result
  commentId: P:QuartzRestApi.Wrappers.RunningJobs.Result
  id: Result
  parent: QuartzRestApi.Wrappers.RunningJobs
  langs:
  - csharp
  - vb
  name: Result
  nameWithType: RunningJobs.Result
  fullName: QuartzRestApi.Wrappers.RunningJobs.Result
  type: Property
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Wrappers
  summary: >-
    Returns the result (if any) that the <xref href="Quartz.IJob" data-throw-if-not-resolved="false"></xref> set before its

    execution completed (the type of object set as the result is entirely up

    to the particular job).
  remarks: >-
    <p>

    The result itself is meaningless to Quartz, but may be informative

    to <xref href="Quartz.IJobListener" data-throw-if-not-resolved="false"></xref>s or

    <xref href="Quartz.ITriggerListener" data-throw-if-not-resolved="false"></xref>s that are watching the job's

    execution.

    </p>

    Set the result (if any) of the <xref href="Quartz.IJob" data-throw-if-not-resolved="false"></xref>'s execution (the type of

    object set as the result is entirely up to the particular job).

    <p>

    The result itself is meaningless to Quartz, but may be informative

    to <xref href="Quartz.IJobListener" data-throw-if-not-resolved="false"></xref>s or

    <xref href="Quartz.ITriggerListener" data-throw-if-not-resolved="false"></xref>s that are watching the job's

    execution.

    </p>
  example: []
  syntax:
    content: public object Result { get; set; }
    parameters: []
    return:
      type: System.Object
    content.vb: Public Property Result As Object
  overload: QuartzRestApi.Wrappers.RunningJobs.Result*
  implements:
  - Quartz.IJobExecutionContext.Result
