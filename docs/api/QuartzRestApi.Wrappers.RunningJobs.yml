- uid: QuartzRestApi.Wrappers.RunningJobs.MergedJobDataMap
  commentId: P:QuartzRestApi.Wrappers.RunningJobs.MergedJobDataMap
  id: MergedJobDataMap
  parent: QuartzRestApi.Wrappers.RunningJobs
  langs:
  - csharp
  - vb
  name: MergedJobDataMap
  nameWithType: RunningJobs.MergedJobDataMap
  fullName: QuartzRestApi.Wrappers.RunningJobs.MergedJobDataMap
  type: Property
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Wrappers
  summary: Get the convenience <xref href="Quartz.JobDataMap" data-throw-if-not-resolved="false"></xref> of this execution context.
  remarks: >-
    <p>

    The <xref href="Quartz.JobDataMap" data-throw-if-not-resolved="false"></xref> found on this object serves as a convenience -

    it is a merge of the <xref href="Quartz.JobDataMap" data-throw-if-not-resolved="false"></xref> found on the

    <xref href="Quartz.IJobExecutionContext.JobDetail" data-throw-if-not-resolved="false"></xref> and the one found on the <xref href="Quartz.ITrigger" data-throw-if-not-resolved="false"></xref>, with

    the value in the latter overriding any same-named values in the former.

    <i>It is thus considered a 'best practice' that the Execute code of a Job

    retrieve data from the JobDataMap found on this object.</i>

    </p>

    <p>

    NOTE: Do not expect value 'set' into this JobDataMap to somehow be

    set back onto a job's own JobDataMap.

    </p>

    <p>

    Attempts to change the contents of this map typically result in an

    illegal state.

    </p>
  example: []
  syntax:
    content: public JobDataMap MergedJobDataMap { get; }
    parameters: []
    return:
      type: Quartz.JobDataMap
    content.vb: Public ReadOnly Property MergedJobDataMap As JobDataMap
  overload: QuartzRestApi.Wrappers.RunningJobs.MergedJobDataMap*
  implements:
  - Quartz.IJobExecutionContext.MergedJobDataMap
