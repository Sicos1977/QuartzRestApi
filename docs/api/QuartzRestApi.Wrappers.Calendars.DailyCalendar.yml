- uid: QuartzRestApi.Wrappers.Calendars.DailyCalendar.RangeStartingTime
  commentId: P:QuartzRestApi.Wrappers.Calendars.DailyCalendar.RangeStartingTime
  id: RangeStartingTime
  parent: QuartzRestApi.Wrappers.Calendars.DailyCalendar
  langs:
  - csharp
  - vb
  name: RangeStartingTime
  nameWithType: DailyCalendar.RangeStartingTime
  fullName: QuartzRestApi.Wrappers.Calendars.DailyCalendar.RangeStartingTime
  type: Property
  assemblies:
  - QuartzRestApi
  namespace: QuartzRestApi.Wrappers.Calendars
  summary: >-
    Must be in the format "HH:MM[:SS[:mmm]]" where:

    <ul>
        <li>
            HH is the hour of the specified time. The hour should be
            specified using military (24-hour) time and must be in the range
            0 to 23.
        </li>
        <li>
            MM is the minute of the specified time and must be in the range
            0 to 59.
        </li>
        <li>
            SS is the second of the specified time and must be in the range
            0 to 59.
        </li>
        <li>
            mmm is the millisecond of the specified time and must be in the
            range 0 to 999.
        </li>
        <li>items enclosed in brackets ('[', ']') are optional.</li>
        <li>
            The time range starting time must be before the time range ending
            time. Note this means that a time range may not cross daily
            boundaries (10PM - 2AM)
        </li>
    </ul>
  remarks: Only used when the <xref href="System.Type" data-throw-if-not-resolved="false"></xref> is <xref href="QuartzRestApi.Wrappers.Calendars.CalendarType.Daily" data-throw-if-not-resolved="false"></xref>
  example: []
  syntax:
    content: >-
      [JsonPropertyName("RangeStartingTime")]

      public string RangeStartingTime { get; }
    parameters: []
    return:
      type: System.String
    content.vb: >-
      <JsonPropertyName("RangeStartingTime")>

      Public Property RangeStartingTime As String
  overload: QuartzRestApi.Wrappers.Calendars.DailyCalendar.RangeStartingTime*
  attributes:
  - type: System.Text.Json.Serialization.JsonPropertyNameAttribute
    ctor: System.Text.Json.Serialization.JsonPropertyNameAttribute.#ctor(System.String)
    arguments:
    - type: System.String
      value: RangeStartingTime
