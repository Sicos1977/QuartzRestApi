name: Build and publish documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs but do not cancel
# the run that is currently deploying so we never leave Pages half-updated.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build docs with DocFX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install DocFX
        run: dotnet tool install --global docfx

      - name: Restore and build (required for DocFX metadata)
        run: dotnet build QuartzRestApi/QuartzRestApi.csproj -c Release

      - name: Build documentation
        run: docfx docs/docfx.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
